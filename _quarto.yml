project:
  type: website
  resources:
    - .nojekyll

website:
  description: "A blog built with Quarto"
  site-url: https://maitreyasuin.github.io/blog
  title: "Maitreya - AI Notes"
  favicon: favicon.svg
  open-graph: true
  twitter-card: true
  search: true
  navbar:
    left:
      - fundamentals.qmd
      - agentic.qmd
      - architectures.qmd
      - llm-systems.qmd
    right:
      - about.qmd
      - icon: github
        href: https://github.com/maitreyasuin/blog

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    code-fold: true
    code-tools: true
    toc: true
    include-in-header:
      - _includes/google-site-verification.html
      - _includes/goatcounter.html
      - _includes/private-view-toggle.html
    include-after-body: _includes/pageviews.html



