<script>
(function () {
  var meta = document.querySelector('.quarto-title-meta');
  if (!meta) return;
  var el = document.createElement('div');
  el.className = 'page-views';
  el.textContent = '… views';
  meta.appendChild(el);
  var path = location.pathname;
  // GoatCounter returns 404 (with a valid zero-count JSON body) for paths
  // that haven't recorded a hit yet - that's a legitimate "0 views", not a
  // failure, so don't gate on r.ok here.
  fetch('https://maitreya.goatcounter.com/counter/' + encodeURIComponent(path) + '.json')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var n = parseInt(data.count, 10) || 0;
      el.textContent = n.toLocaleString() + (n === 1 ? ' view' : ' views');
    })
    .catch(function () { el.remove(); });
})();
</script>
